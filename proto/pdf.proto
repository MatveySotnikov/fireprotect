syntax = "proto3";

package pdfpb;

option go_package = "gen/pdfpb";

service PdfService {
  rpc GenerateAct (PdfRequest) returns (PdfResponse);
}

message PdfRequest {
  string user_name = 1;
  string user_email = 2;
  double area = 3;
  double normative_rate = 4;
  int32 layers = 5;
  double slope_angle = 6;
  double loss_factor = 7;
  double density = 8;
  double total_mass = 9;
  double total_volume = 10;
  string calc_date = 11;  // RFC3339
}

message PdfResponse {
  bytes pdf_data = 1;
}