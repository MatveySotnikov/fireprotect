services:
  postgres:
    image: postgres:16-alpine
    container_name: fireprotect-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fireprotect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-fireprotect}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: