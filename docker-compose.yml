version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fireprotect-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fireprotect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-fireprotect}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fireprotect} -d ${POSTGRES_DB:-fireprotect}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  calculator:
    build:
      context: .
      dockerfile: services/calculator/Dockerfile
    container_name: fireprotect-calculator
    expose:
      - "50051"
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=:50051"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: fireprotect-gateway
    ports:
      - "8080:8080"
    environment:
      CALCULATOR_ADDR: calculator:50051
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-fireprotect}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      DB_NAME: ${POSTGRES_DB:-fireprotect}
      JWT_SECRET: ${JWT_SECRET:-my-super-secret-key-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      calculator:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: